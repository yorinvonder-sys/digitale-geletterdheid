name: GitHub Agent Bridge

on:
  workflow_dispatch:
  push:
    paths:
      - "bridge/inbox/**/*.json"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: github-agent-bridge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  process-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Process agent pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: node scripts/github-agent-bridge.mjs process-pipeline

      - name: Commit bridge output
        run: |
          if [ -z "$(git status --short --untracked-files=all -- bridge)" ]; then
            echo "No bridge changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bridge
          git commit -m "chore(bridge): process agent inbox"
          git push
