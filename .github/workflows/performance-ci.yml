name: Performance CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Build
        run: npm run build

      - name: Lighthouse + network + bundle budgets
        env:
          LIGHTHOUSE_RUNS: 3
          LH_SCORE_MIN: 75
          LH_ROOT_LCP_MAX: 4000
          LH_LOGIN_LCP_MAX: 8000
          LH_SCHOLEN_LCP_MAX: 4000
          CHROME_PATH: /usr/bin/google-chrome-stable
        run: npm run performance:ci
