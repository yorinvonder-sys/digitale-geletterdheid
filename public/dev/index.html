<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGSkills Dev — Installeren</title>
    <link rel="manifest" href="/dev-manifest.webmanifest">
    <meta name="theme-color" content="#7C3AED">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DGSkills Dev">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" href="/icon-192x192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0F0F0F;
            color: #F8FAFC;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #1E1E1E;
            border: 1px solid #333;
            border-radius: 24px;
            padding: 48px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .icon {
            width: 80px;
            height: 80px;
            background: #7C3AED;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
        }
        h1 {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #94A3B8;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 32px;
        }
        .install-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #7C3AED;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            justify-content: center;
            transition: background 0.2s;
        }
        .install-btn:hover { background: #6D28D9; }
        .install-btn:disabled { opacity: 0.5; cursor: wait; }
        .skip-btn {
            display: block;
            margin-top: 16px;
            color: #64748B;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
        .skip-btn:hover { color: #94A3B8; }
        .steps {
            text-align: left;
            background: #262626;
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 24px;
        }
        .steps p {
            color: #94A3B8;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .steps p:last-child { margin-bottom: 0; }
        .steps strong { color: #E2E8F0; }
        .hidden { display: none; }
        .badge {
            display: inline-block;
            background: #7C3AED22;
            color: #A78BFA;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🛠️</div>
        <div class="badge">Developer</div>
        <h1>DGSkills Dev</h1>
        <p class="subtitle">
            Installeer de developer-app voor directe toegang tot je boekhouding,
            bonnetje-scanner en belastingtools.
        </p>

        <!-- Android: automatische install prompt -->
        <div id="auto-install" class="hidden">
            <button class="install-btn" id="install-btn" onclick="handleInstall()">
                📲 App installeren
            </button>
        </div>

        <!-- Fallback: handmatige instructies -->
        <div id="manual-install">
            <div class="steps">
                <p><strong>Android (Chrome):</strong> Tik op ⋮ menu → "App installeren"</p>
                <p><strong>iPhone (Safari):</strong> Tik op Deel (↑) → "Zet op beginscherm"</p>
            </div>
        </div>

        <a href="/dashboard" class="skip-btn">Of open direct het dashboard →</a>
    </div>

    <script>
        let deferredPrompt = null;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('auto-install').classList.remove('hidden');
            document.getElementById('manual-install').classList.add('hidden');
        });

        async function handleInstall() {
            if (!deferredPrompt) return;
            const btn = document.getElementById('install-btn');
            btn.disabled = true;
            btn.textContent = 'Installeren...';
            try {
                await deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    btn.textContent = '✓ Geïnstalleerd!';
                    setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
                } else {
                    btn.disabled = false;
                    btn.textContent = '📲 App installeren';
                }
            } catch {
                btn.disabled = false;
                btn.textContent = '📲 App installeren';
            }
            deferredPrompt = null;
        }

        // Als al in standalone modus → direct naar dashboard
        if (window.matchMedia('(display-mode: standalone)').matches) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
